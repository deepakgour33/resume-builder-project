<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            background: radial-gradient(circle at top right,#1e1b4b,#0f172a,#020617);
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:'Segoe UI',sans-serif;
            color:white;
        }
        .auth-box{
            width:950px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,0.35);
            display:grid;
            grid-template-columns:1fr 1fr;
        }
        .left{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            color:white;
            padding:60px 40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }
        .right{
            padding:45px 35px;
        }
        .form-control{
            border-radius:12px;
            padding:12px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            color:white;
        }
        .btn-register{
            border-radius:12px;
            padding:12px;
            font-weight:600;
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            border:none;
            color:white;
        }
    </style>
</head>
<body>

<div class="auth-box">
    <div class="left">
        <h1>🚀 Join AI Resume Builder</h1>
        <p class="mt-3">
            Start your journey with premium AI resumes and smart career tools.
        </p>
    </div>

    <div class="right">
        <h2 class="mb-4">Create Account ✨</h2>

        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
            {% endif %}

            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password1" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Confirm Password</label>
                <input type="password" name="password2" class="form-control" required>
            </div>

            <button class="btn w-100 btn-register">Register</button>
        </form>

        <p class="mt-4 text-center">
            Already have an account?
            <a href="/login/" class="text-info">Login</a>
        </p>
    </div>
</div>

</body>
</html>
