<!doctype html>
<html>
<head>
    <title>Create Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background: radial-gradient(circle at top right,#312e81,#0f172a,#020617);
            min-height:100vh;
            color:white;
            font-family:'Segoe UI',sans-serif;
        }

        .form-box{
            max-width:900px;
            margin:50px auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:22px;
            padding:35px;
            box-shadow:0 15px 40px rgba(0,0,0,0.3);
        }

        .form-control, textarea, select{
            background: rgba(255,255,255,0.06) !important;
            border:1px solid rgba(255,255,255,0.15) !important;
            color:white !important;
            border-radius:14px;
            padding:12px;
        }

        .form-control::placeholder,
        textarea::placeholder{
            color:#cbd5e1;
        }

        label{
            margin-top:14px;
            margin-bottom:8px;
            font-weight:600;
            color:#e2e8f0;
        }

        .btn-ai{
            background: linear-gradient(135deg,#2563eb,#7c3aed);
            border:none;
            color:white;
            border-radius:14px;
            padding:12px 22px;
            font-weight:600;
            margin-top:20px;
        }

        h2{
            margin-bottom:25px;
            font-weight:700;
        }

        .sub{
            color:#cbd5e1;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>📄 Build Your AI Resume</h2>
    <p class="sub">Fill your professional details and generate ATS-friendly resume 🚀</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-ai">💾 Save Resume</button>
    </form>
</div>

</body>
</html>
